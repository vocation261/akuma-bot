services:
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: DEV-BotkumaX
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.env.dev:/app/.env:ro
      - ./config.dev.json:/app/config.dev.json
      - ./alertados.dev.json:/app/alertados.dev.json
